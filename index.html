<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Slingshot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: 'Inter', sans-serif; user-select: none;}
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 20px; left: 0; width: 100%; max-width: 100%; text-align: center; color: #fde047; pointer-events: none; overflow: auto;}
        #start-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 10; color: white; }
		div.scroll-container {
			width: 100%;
			max-width: 100%;
			padding: 10px;
			overflow-x: auto;
			white-space: nowrap;
			user-select: text;
		}

        div.progresses {
            background-color: rgb(255, 255, 255);
            width: 300px;
			max-width: 80%;
			height: 30px;
            border-radius: 30px;
			text-align: center;
			margin: 0 auto;
        }

        .level {
            background-color: #77ff44;
            color: white;
			height: 30px;
            text-align: right;
            font-size: 20px;
            border-radius: 30px;
			text-align: center;
            width: 0%;
        }

        .health {
            background-color: rgb(255, 92, 110);
            color: white;
			height: 30px;
            text-align: right;
            font-size: 20px;
            border-radius: 30px;
			text-align: center;
            width: 100%;
        }

    </style>
    <link rel="icon" href="favicon">
</head>
<body>

    <div id="start-screen">
        <h1 class="text-6xl font-black mb-8 tracking-tighter text-blue-400" id="title-text">NEON SLINGSHOT</h1>
        <button id="start-btn" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 rounded-full font-bold text-xl pointer-events-auto transition">START GAME</button>
        <button id="flashes-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold text-xl pointer-events-auto transition">ENABLE FLASHES</button>
        <button id="webrtc-btn" class="px-6 py-3 bg-green-600 hover:bg-green-500 rounded-full font-bold text-xl pointer-events-auto transition">PLAY AGAINST RIVAL (BETA)</button>
		<div id="webrtc-dialog" class="scroll-container"></div>
    </div>

    <div class="ui-overlay">
        <h1 class="text-4xl font-bold tracking-widest drop-shadow-lg">STREAK: <span id="score">0</span></h1>
        <h1 class="text-4xl font-bold tracking-widest drop-shadow-lg">RIVAL: <span id="rival">-</span></h1>
        <h1 class="text-4xl font-bold tracking-widest drop-shadow-lg">FPS ≈ <span id="fps">0</span></h1>
        <h6 class="text-4xl font-bold tracking-widest drop-shadow-lg" style="color: #77ff44;">LEVEL <span id="level">0</span></h6>
        <div class="progresses">
			<div id="level-bar" class="level"></div>
		</div>
        <div class="progresses">
			<div id="health-bar" class="health"></div>
		</div>

    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js">
    </script>
</body>
</html>

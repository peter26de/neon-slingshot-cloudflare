<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Slingshot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 20px; left: 0; width: 100%; text-align: center; color: #fde047; pointer-events: none; }
        #start-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 10; color: white; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="text-6xl font-black mb-8 tracking-tighter text-blue-400">NEON SLINGSHOT</h1>
        <button id="start-btn" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 rounded-full font-bold text-xl pointer-events-auto transition">START GAME</button>
    </div>

    <div class="ui-overlay">
        <h1 class="text-4xl font-bold tracking-widest drop-shadow-lg">SCORE: <span id="score">0</span></h1>
        <h2 class="text-4xl font-bold tracking-widest drop-shadow-lg">FPS ≈ <span id="fps">0</span></h2>
        <div class="mt-4 w-64 h-4 bg-gray-700 rounded-full mx-auto overflow-hidden">
            <div id="combo-bar" class="h-full bg-green-500 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js">
    </script>
</body>
</html>
